<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
<form th:action="@{/orders/place}" th:object="${order}" method="post">

    <label>Name:</label>
    <input type="text" th:field="*{customerName}" />

    <label>Address:</label>
    <input type="text" th:field="*{address}" />

    <button type="submit">Place Order</button>

</form>

</body>
</html>
